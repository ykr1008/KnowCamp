name: KnowCamp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 . --count --max-line-length=120 --exclude=__pycache__,chroma_db --statistics
        continue-on-error: true

      - name: Run tests
        run: |
          cd backend
          pip install pytest
          pytest tests/ -v
        continue-on-error: true